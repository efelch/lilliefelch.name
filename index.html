<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Princess Room Sorter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Great+Vibes&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
</head>
<body>
    <div id="game-container">
        <div id="loading-screen">
            <div class="modal">
                <h2>Preparing the Palace...</h2>
                <div class="loader"></div>
                <p>Loading Royal Music</p>
                <button id="start-button" class="hidden">Enter the Room</button>
            </div>
        </div>
        <div id="curtain-left" class="curtain"></div>
        <div id="curtain-right" class="curtain"></div>
        <div id="ui-layer">
            <div id="score-board">Score: <span id="score">0</span></div>
            <div id="pause-container">
                <button id="pause-button">
                    <iconify-icon icon="mdi:pause"></iconify-icon>
                </button>
            </div>
            <div id="music-selector-container">
                <select id="music-selector">
                    <option value="" disabled selected>🎵 Select Music</option>
                    <option value="music/80s-Princess.mp3">80s Princess</option>
                    <option value="music/Awkward-Princesss-Day-Out.mp3">Awkward Princess</option>
                    <option value="music/The-Spunky-Princess.ogg">Spunky Princess</option>
                </select>
            </div>
            <div id="timer-display">Time: <span id="timer">300</span>s</div>
            <div id="reference-link-container" style="pointer-events: auto;">
                <a href="icons.html" title="Icon Credits" style="background: rgba(255, 255, 255, 0.9); width: 40px; height: 40px; border-radius: 50%; border: 3px double #f06292; display: flex; justify-content: center; align-items: center; text-decoration: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: transform 0.2s, background 0.2s;">
                    <iconify-icon icon="mdi:information-variant" style="font-size: 20px; color: #880e4f;"></iconify-icon>
                </a>
            </div>
        </div>

        <div id="room-background">
            <div id="messy-pile" class="drop-zone"></div>
        </div>

        <div id="sorting-area-container">
            <div id="sorting-area" class="drop-zone"></div>
        </div>

        <div id="game-over" class="hidden">
            <div class="modal">
                <h2>Time's Up!</h2>
                <p id="final-stats"></p>
                <div class="modal-buttons">
                    <button onclick="location.reload()">Play Again</button>
                    <a href="icons.html" style="color: #c2185b; text-decoration: none; margin-top: 10px; font-family: 'Cinzel', serif; font-size: 0.9rem;">View Icon Credits</a>
                </div>
            </div>
        </div>

        <div id="pause-screen" class="hidden">
            <div class="modal">
                <h2>Game Paused</h2>
                <p>Take a royal breather</p>
                <div class="modal-buttons">
                    <button id="resume-button">Resume Game</button>
                    <button id="new-game-button">New Game</button>
                    <a href="icons.html" style="color: #c2185b; text-decoration: none; margin-top: 10px; font-family: 'Cinzel', serif; font-size: 0.9rem;">View Icon Credits</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/items.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
